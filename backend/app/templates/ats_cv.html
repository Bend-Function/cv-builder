<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ document.title }}</title>
    <style>
        {% include "../static/ats.css" %}
    </style>
</head>
<body>
    <main class="cv cv--ats">
        <header>
            <h1>{{ document.title }}</h1>
            {% if document.contact_header %}
            <p class="contact">{{ document.contact_header }}</p>
            {% endif %}
        </header>
        {% for section in document.sections %}
        <section>
            <h2>{{ section.heading }}</h2>
            {% if section.items %}
            <ul>
                {% for item in section.items %}
                <li>{{ item }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        </section>
        {% endfor %}
    </main>
</body>
</html>
